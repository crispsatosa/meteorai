<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meteor AI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;}
:root{--bg:#0f0404;--sidebar:#0a0303;--accent:#D94F32;--ai-bubble:#1a0808;--border:rgba(255,255,255,0.06);--input-border:rgba(255,255,255,0.12);--text:#ffffff;--sub:rgba(255,255,255,0.45);--sugg-bg:rgba(255,255,255,0.04);--sugg-border:rgba(255,255,255,0.1);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}
#app{display:flex;height:100vh;}

/* ── Sidebar ── */
#sidebar{width:220px;min-width:220px;display:flex;flex-direction:column;padding:20px 14px;border-right:1px solid var(--border);background:var(--sidebar);transition:background 0.3s;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.logo-name{font-size:18px;font-weight:500;letter-spacing:0.5px;color:var(--text);}
.logo-sub{font-size:9px;letter-spacing:2px;opacity:0.4;color:var(--text);}
#new-btn{width:100%;padding:11px 16px;border-radius:50px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;background:var(--accent);color:#fff;transition:opacity 0.2s;margin-bottom:auto;}
#new-btn:hover{opacity:0.85;}
.theme-section{padding-top:20px;}
.theme-label{font-size:9px;letter-spacing:2px;opacity:0.4;margin-bottom:10px;color:var(--text);}
.theme-dots{display:flex;gap:8px;margin-bottom:16px;}
.theme-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.2s;}
.theme-dot.active{border-color:#fff;}
.admin-btn{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12px;opacity:0.35;color:var(--text);border:none;background:none;font-family:inherit;transition:opacity 0.2s;width:100%;}
.admin-btn:hover{opacity:0.7;}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
#chat-area{flex:1;overflow-y:auto;padding:40px 60px;display:flex;flex-direction:column;}
#empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.empty-title{font-family:'Playfair Display',serif;font-size:48px;font-weight:300;margin-bottom:12px;color:var(--text);text-align:center;}
.empty-sub{font-size:15px;opacity:0.6;margin-bottom:40px;color:var(--text);text-align:center;}
.suggestions{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:540px;}
.sugg-btn{padding:16px 20px;border-radius:12px;border:1px solid var(--sugg-border);background:var(--sugg-bg);cursor:pointer;font-family:inherit;font-size:13px;text-align:left;color:var(--text);transition:all 0.2s;}
.sugg-btn:hover{background:rgba(255,255,255,0.09);}

/* ── Messages ── */
#messages{display:none;flex-direction:column;}
.message{margin-bottom:28px;display:flex;flex-direction:column;}
.message.user{align-items:flex-end;}.message.ai{align-items:flex-start;}
.msg-label{font-size:10px;letter-spacing:2px;opacity:0.5;margin-bottom:8px;color:var(--text);}
.ai-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ai-label{font-size:10px;letter-spacing:2px;color:var(--accent);opacity:0.8;}
.user-bubble{padding:14px 20px;border-radius:20px 20px 4px 20px;max-width:480px;font-size:14px;line-height:1.6;background:var(--accent);color:#fff;word-break:break-word;}
.ai-bubble{padding:20px 24px;border-radius:4px 20px 20px 20px;max-width:700px;font-size:14px;line-height:1.8;border:1px solid var(--border);background:var(--ai-bubble);color:var(--text);word-break:break-word;}
.ai-bubble p{margin:0 0 10px;}.ai-bubble p:last-child{margin-bottom:0;}
.ai-bubble strong{font-weight:600;}
.ai-bubble h1{font-size:18px;font-weight:600;margin:16px 0 8px;}
.ai-bubble h2{font-size:16px;font-weight:600;margin:14px 0 6px;}
.ai-bubble h3{font-size:14px;font-weight:600;margin:12px 0 4px;}
.ai-bubble ul,.ai-bubble ol{padding-left:20px;margin:8px 0;}
.ai-bubble li{margin-bottom:4px;}
.ai-bubble code{background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px;font-family:monospace;font-size:13px;}
.ai-bubble pre{background:rgba(0,0,0,0.4);padding:14px 16px;border-radius:8px;overflow-x:auto;margin:10px 0;}
.ai-bubble pre code{background:none;padding:0;}
.ai-bubble blockquote{border-left:3px solid rgba(255,255,255,0.25);padding-left:12px;opacity:0.8;margin:8px 0;}
.ai-bubble a{color:#E8832A;text-decoration:underline;}
.ai-bubble hr{border:none;border-top:1px solid rgba(255,255,255,0.1);margin:12px 0;}
.ai-bubble table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px;}
.ai-bubble th{border:1px solid rgba(255,255,255,0.15);padding:6px 10px;text-align:left;font-weight:600;}
.ai-bubble td{border:1px solid rgba(255,255,255,0.1);padding:6px 10px;}
.typing{display:flex;gap:5px;align-items:center;padding:4px 0;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);animation:bounce 1.2s infinite ease-in-out;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.cursor{display:inline-block;width:2px;height:14px;background:var(--accent);margin-left:2px;animation:blink .8s infinite;vertical-align:middle;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── Input ── */
#input-area{padding:16px 60px 20px;border-top:1px solid var(--border);}
#input-wrap{display:flex;align-items:center;gap:12px;border-radius:50px;border:1px solid var(--input-border);padding:8px 8px 8px 20px;background:rgba(255,255,255,0.03);}
#msg-input{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:14px;color:var(--text);}
#msg-input::placeholder{opacity:0.35;color:var(--text);}
#send-btn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--accent);transition:opacity 0.2s;flex-shrink:0;}
#send-btn:disabled{opacity:0.4;cursor:default;}
#send-btn:not(:disabled):hover{opacity:0.85;}
.footer-note{text-align:center;font-size:11px;opacity:0.35;margin-top:10px;color:var(--text);}

/* ── Dashboard overlay ── */
#dash-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
#dash-overlay.open{display:flex;}
#dash-modal{width:720px;max-width:95vw;max-height:90vh;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;background:#0d0d0d;border:1px solid rgba(255,255,255,0.1);}
#dash-login{padding:52px 48px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.dash-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:300;color:#fff;text-align:center;margin-top:4px;}
.dash-sub{font-size:13px;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:4px;}
.dash-input{width:100%;max-width:320px;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;font-family:inherit;font-size:14px;outline:none;transition:border-color 0.2s;}
.dash-input::placeholder{opacity:0.35;}
.dash-input:focus{border-color:rgba(255,255,255,0.25);}
.dash-submit{width:100%;max-width:320px;padding:12px;border-radius:10px;border:none;background:#D94F32;color:#fff;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:opacity 0.2s;margin-top:2px;}
.dash-submit:hover{opacity:0.85;}
.dash-err{font-size:12px;color:#ff7070;display:none;margin-top:-4px;}
.cancel-link{background:none;border:none;color:rgba(255,255,255,0.28);font-family:inherit;font-size:13px;cursor:pointer;margin-top:2px;}
.cancel-link:hover{color:rgba(255,255,255,0.5);}
#dash-main{display:none;flex-direction:column;height:100%;}
.dash-header{padding:20px 28px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.dash-header-title{font-size:15px;font-weight:500;color:#fff;}
.dash-actions{display:flex;gap:10px;align-items:center;}
.dash-close{background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:20px;line-height:1;padding:4px 8px;transition:color 0.2s;}
.dash-close:hover{color:#fff;}
.dash-body{flex:1;overflow-y:auto;padding:24px 28px;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.stat-card{background:rgba(255,255,255,0.04);border-radius:10px;padding:16px 20px;border:1px solid rgba(255,255,255,0.07);}
.stat-label{font-size:10px;letter-spacing:1.5px;opacity:0.4;color:#fff;margin-bottom:8px;text-transform:uppercase;}
.stat-val{font-size:30px;font-weight:500;color:#fff;}
.dash-section-title{font-size:10px;letter-spacing:2px;opacity:0.35;color:#fff;margin-bottom:14px;text-transform:uppercase;}
.log-card{padding:16px 18px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);margin-bottom:10px;}
.log-time{font-size:11px;opacity:0.38;color:#fff;margin-bottom:12px;}
.log-exchange{margin-bottom:8px;}
.log-role{font-size:10px;letter-spacing:1px;margin-bottom:3px;font-weight:500;}
.log-role.user{color:#D94F32;}.log-role.ai{color:#E8832A;}
.log-msg{font-size:13px;color:rgba(255,255,255,0.7);line-height:1.5;word-break:break-word;}
.divider{height:1px;background:rgba(255,255,255,0.06);margin:10px 0;}
.clear-btn{padding:7px 14px;border-radius:8px;border:1px solid rgba(255,80,80,0.3);background:rgba(255,80,80,0.07);color:#ff7070;font-family:inherit;font-size:12px;cursor:pointer;transition:all 0.2s;}
.clear-btn:hover{background:rgba(255,80,80,0.15);}
.empty-logs{text-align:center;padding:48px 24px;color:rgba(255,255,255,0.25);font-size:14px;line-height:1.7;}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <circle cx="20" cy="8" r="5" fill="#E8832A"/>
        <line x1="17" y1="11" x2="4" y2="24" stroke="#E8832A" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <div>
        <div class="logo-name">Meteor</div>
        <div class="logo-sub">AI ASSISTANT</div>
      </div>
    </div>

    <button id="new-btn">
      <span style="font-size:18px;line-height:1">+</span> New chat
    </button>

    <div class="theme-section">
      <div class="theme-label">THEME</div>
      <div class="theme-dots">
        <div class="theme-dot active" style="background:#444" data-theme="dark"></div>
        <div class="theme-dot" style="background:#f0ece8;border-color:rgba(0,0,0,0.2)" data-theme="light"></div>
        <div class="theme-dot" style="background:#D94F32" data-theme="red"></div>
        <div class="theme-dot" style="background:#7c3aed" data-theme="purple"></div>
      </div>
      <button class="admin-btn" onclick="openDash()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
        </svg>
        Owner Dashboard
      </button>
    </div>
  </aside>

  <main id="main">
    <div id="chat-area">
      <div id="empty-state">
        <div style="margin-bottom:24px">
          <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
            <circle cx="42" cy="18" r="10" fill="#E8832A"/>
            <line x1="35" y1="25" x2="8" y2="52" stroke="#E8832A" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="empty-title">Hello there</div>
        <div class="empty-sub">What can Meteor help you with today?</div>
        <div class="suggestions">
          <button class="sugg-btn" data-text="Explain a concept like I'm five">Explain a concept like I'm five</button>
          <button class="sugg-btn" data-text="Help me brainstorm ideas">Help me brainstorm ideas</button>
          <button class="sugg-btn" data-text="Draft an email for me">Draft an email for me</button>
          <button class="sugg-btn" data-text="Summarize this text...">Summarize this text...</button>
        </div>
      </div>
      <div id="messages"></div>
    </div>
    <div id="input-area">
      <div id="input-wrap">
        <input id="msg-input" placeholder="Message Meteor..." autocomplete="off"/>
        <button id="send-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 13V3M8 3L3 8M8 3L13 8" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="footer-note">Meteor can make mistakes. Verify important information.</div>
    </div>
  </main>
</div>

<!-- Dashboard -->
<div id="dash-overlay">
  <div id="dash-modal">
    <div id="dash-login">
      <svg width="38" height="38" viewBox="0 0 28 28" fill="none">
        <circle cx="20" cy="8" r="5" fill="#E8832A"/>
        <line x1="17" y1="11" x2="4" y2="24" stroke="#E8832A" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <div class="dash-title">Owner Dashboard</div>
      <div class="dash-sub">Sign in with your owner email and password</div>
      <input class="dash-input" id="dash-email" type="email" placeholder="owner@email.com" autocomplete="off"/>
      <input class="dash-input" id="dash-pass" type="password" placeholder="Password"/>
      <div class="dash-err" id="dash-err">Incorrect email or password.</div>
      <button class="dash-submit" onclick="dashLogin()">Access Dashboard</button>
      <button class="cancel-link" onclick="closeDash()">Cancel</button>
    </div>
    <div id="dash-main">
      <div class="dash-header">
        <div class="dash-header-title">Owner Dashboard</div>
        <div class="dash-actions">
          <button class="clear-btn" onclick="clearLogs()">Clear all logs</button>
          <button class="dash-close" onclick="closeDash()">✕</button>
        </div>
      </div>
      <div class="dash-body" id="dash-body"></div>
    </div>
  </div>
</div>

<script>
// ── Owner config — change password here ──────────────────────────────────────
const OWNER_EMAILS = ['christidumc@gmail.com','cchristidum@gmail.com']
const OWNER_PASSWORD = 'Meteor2025'

// ── Themes ────────────────────────────────────────────────────────────────────
const THEMES = {
  dark:  {bg:'#0f0404',sidebar:'#0a0303',accent:'#D94F32',ai:'#1a0808',border:'rgba(255,255,255,0.06)',iborder:'rgba(255,255,255,0.12)',text:'#ffffff',sb:'rgba(255,255,255,0.04)',sborder:'rgba(255,255,255,0.1)'},
  light: {bg:'#f5ede8',sidebar:'#ede0d8',accent:'#D94F32',ai:'#fffaf8',border:'rgba(0,0,0,0.08)',iborder:'rgba(0,0,0,0.15)',text:'#1a0808',sb:'rgba(0,0,0,0.04)',sborder:'rgba(0,0,0,0.1)'},
  red:   {bg:'#130101',sidebar:'#0d0101',accent:'#ff3333',ai:'#1e0404',border:'rgba(255,255,255,0.06)',iborder:'rgba(255,255,255,0.12)',text:'#ffffff',sb:'rgba(255,255,255,0.04)',sborder:'rgba(255,100,100,0.2)'},
  purple:{bg:'#0e0818',sidebar:'#09051a',accent:'#8b5cf6',ai:'#160c2a',border:'rgba(255,255,255,0.06)',iborder:'rgba(255,255,255,0.12)',text:'#ffffff',sb:'rgba(255,255,255,0.04)',sborder:'rgba(139,92,246,0.2)'},
}

// ── State ─────────────────────────────────────────────────────────────────────
let messages=[], loading=false

// ── Markdown ──────────────────────────────────────────────────────────────────
function md(raw){
  const blocks=[]
  let t=raw.replace(/```[\w]*\n?([\s\S]*?)```/g,(_,c)=>{
    blocks.push(`<pre><code>${c.trim().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`)
    return '\x00'+(blocks.length-1)+'\x00'
  })
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
   .replace(/`([^`]+)`/g,'<code>$1</code>')
   .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
   .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>')
   .replace(/^---$/gm,'<hr>').replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
   .replace(/^\s*[-*] (.+)$/gm,'<li>$1</li>').replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
   .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
   .replace(/\x00(\d+)\x00/g,(_,i)=>blocks[i])
   .replace(/(<li>.*?<\/li>\n?)+/gs,m=>`<ul>${m}</ul>`)
  return t.split(/\n\n+/).map(b=>/^<(h[1-6]|ul|pre|blockquote|hr)/.test(b.trim())?b:`<p>${b.replace(/\n/g,'<br>')}</p>`).join('')
}

// ── Theme ─────────────────────────────────────────────────────────────────────
function applyTheme(k){
  const t=THEMES[k],r=document.documentElement.style
  r.setProperty('--bg',t.bg);r.setProperty('--sidebar',t.sidebar);r.setProperty('--accent',t.accent)
  r.setProperty('--ai-bubble',t.ai);r.setProperty('--border',t.border);r.setProperty('--input-border',t.iborder)
  r.setProperty('--text',t.text);r.setProperty('--sugg-bg',t.sb);r.setProperty('--sugg-border',t.sborder)
  document.body.style.background=t.bg
  document.querySelectorAll('.theme-dot').forEach(d=>d.classList.remove('active'))
  document.querySelector(`[data-theme="${k}"]`).classList.add('active')
}

// ── Chat ──────────────────────────────────────────────────────────────────────
const SYSTEM=`You are Meteor, a brilliant AI assistant — sharp, knowledgeable, and direct.
You excel at science, code, math, writing, analysis, history, and creative tasks.
Be concise when the question is simple. Be thorough when it needs depth.
Use markdown formatting (bold, headers, lists, code blocks) when it adds clarity.
You are NOT Claude, GPT, Grok, or Gemini. You are Meteor.`

function showEmpty(v){
  document.getElementById('empty-state').style.display=v?'flex':'none'
  document.getElementById('messages').style.display=v?'none':'flex'
}

function scroll(){const a=document.getElementById('chat-area');a.scrollTop=a.scrollHeight}

function addUserMsg(text){
  showEmpty(false)
  const c=document.getElementById('messages')
  const d=document.createElement('div')
  d.className='message user'
  d.innerHTML=`<div class="msg-label" style="text-align:right">YOU</div>
    <div class="user-bubble">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`
  c.appendChild(d);scroll()
}

function addAIMsg(idx){
  const c=document.getElementById('messages')
  const d=document.createElement('div')
  d.className='message ai';d.id=`m${idx}`
  d.innerHTML=`<div class="ai-header">
    <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
      <circle cx="20" cy="8" r="5" fill="#E8832A"/>
      <line x1="17" y1="11" x2="4" y2="24" stroke="#E8832A" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div class="ai-label">METEOR</div>
  </div>
  <div class="ai-bubble" id="b${idx}">
    <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>`
  c.appendChild(d);scroll()
}

function updateBubble(idx,text,streaming){
  const b=document.getElementById('b'+idx);if(!b)return
  b.innerHTML=(streaming&&!text)
    ?'<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>'
    :md(text)+(streaming?'<span class="cursor"></span>':'')
  scroll()
}

async function sendMessage(override){
  if(loading)return
  const inp=document.getElementById('msg-input')
  const text=(override||inp.value).trim();if(!text)return
  inp.value='';loading=true
  document.getElementById('send-btn').disabled=true

  messages.push({role:'user',content:text})
  addUserMsg(text)
  const aiIdx=messages.length
  messages.push({role:'assistant',content:'',streaming:true})
  addAIMsg(aiIdx)

  try{
    const res=await fetch('https://text.pollinations.ai/openai',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'openai',stream:true,
        messages:[{role:'system',content:SYSTEM},...messages.slice(0,-1).map(m=>({role:m.role,content:m.content}))]
      })
    })
    if(!res.ok)throw new Error(`HTTP ${res.status}`)
    const reader=res.body.getReader(),dec=new TextDecoder()
    let full=''
    while(true){
      const{done,value}=await reader.read();if(done)break
      for(const line of dec.decode(value,{stream:true}).split('\n')){
        if(!line.startsWith('data: ')||line.trim()==='data: [DONE]')continue
        try{const tok=JSON.parse(line.slice(6)).choices?.[0]?.delta?.content||'';if(tok){full+=tok;updateBubble(aiIdx,full,true)}}catch{}
      }
    }
    messages[aiIdx]={role:'assistant',content:full,streaming:false}
    updateBubble(aiIdx,full,false)

    // Save to localStorage
    const logs=JSON.parse(localStorage.getItem('meteor_logs')||'[]')
    logs.push({time:new Date().toISOString(),msgs:[{role:'user',content:text},{role:'assistant',content:full}]})
    localStorage.setItem('meteor_logs',JSON.stringify(logs))

  }catch(e){
    const err=`**Could not connect to Meteor AI.**\nCheck your internet connection and try again.\n\n_Error: ${e.message}_`
    messages[aiIdx]={role:'assistant',content:err,streaming:false}
    updateBubble(aiIdx,err,false)
  }
  loading=false;document.getElementById('send-btn').disabled=false;inp.focus()
}

function newChat(){
  messages=[];document.getElementById('messages').innerHTML='';showEmpty(true)
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function openDash(){
  const o=document.getElementById('dash-overlay')
  o.classList.add('open')
  document.getElementById('dash-login').style.display='flex'
  document.getElementById('dash-main').style.display='none'
  document.getElementById('dash-err').style.display='none'
  document.getElementById('dash-email').value=''
  document.getElementById('dash-pass').value=''
  setTimeout(()=>document.getElementById('dash-email').focus(),100)
}

function closeDash(){document.getElementById('dash-overlay').classList.remove('open')}

function dashLogin(){
  const email=document.getElementById('dash-email').value.trim().toLowerCase()
  const pass=document.getElementById('dash-pass').value
  const err=document.getElementById('dash-err')
  if(!OWNER_EMAILS.includes(email)||pass!==OWNER_PASSWORD){err.style.display='block';return}
  err.style.display='none'
  document.getElementById('dash-login').style.display='none'
  document.getElementById('dash-main').style.display='flex'
  renderDash()
}

function renderDash(){
  const logs=JSON.parse(localStorage.getItem('meteor_logs')||'[]')
  const totalSessions=logs.length
  const totalMsgs=logs.reduce((a,l)=>a+l.msgs.length,0)
  const userMsgs=logs.reduce((a,l)=>a+l.msgs.filter(m=>m.role==='user').length,0)

  let html=`<div class="stat-row">
    <div class="stat-card"><div class="stat-label">Conversations</div><div class="stat-val">${totalSessions}</div></div>
    <div class="stat-card"><div class="stat-label">Total Messages</div><div class="stat-val">${totalMsgs}</div></div>
    <div class="stat-card"><div class="stat-label">User Messages</div><div class="stat-val">${userMsgs}</div></div>
  </div>
  <div class="dash-section-title">Conversation Logs</div>`

  if(!logs.length){
    html+=`<div class="empty-logs">No conversations yet.<br>Chats will appear here once people start using Meteor.</div>`
  }else{
    [...logs].reverse().forEach(log=>{
      const d=new Date(log.time)
      const ts=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})
      html+=`<div class="log-card"><div class="log-time">${ts}</div>`
      log.msgs.forEach((m,i)=>{
        const snippet=m.content.length>400?m.content.slice(0,400)+'…':m.content
        html+=`<div class="log-exchange">
          <div class="log-role ${m.role==='user'?'user':'ai'}">${m.role==='user'?'USER':'METEOR'}</div>
          <div class="log-msg">${snippet.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        </div>${i<log.msgs.length-1?'<div class="divider"></div>':''}`
      })
      html+=`</div>`
    })
  }
  document.getElementById('dash-body').innerHTML=html
}

function clearLogs(){
  if(!confirm('Delete all conversation logs? This cannot be undone.'))return
  localStorage.removeItem('meteor_logs');renderDash()
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('new-btn').onclick=newChat
document.getElementById('send-btn').onclick=()=>sendMessage()
document.getElementById('msg-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}})
document.getElementById('dash-pass').addEventListener('keydown',e=>{if(e.key==='Enter')dashLogin()})
document.getElementById('dash-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('dash-overlay'))closeDash()})
document.querySelectorAll('.theme-dot').forEach(d=>d.onclick=()=>applyTheme(d.dataset.theme))
document.querySelectorAll('.sugg-btn').forEach(b=>b.onclick=()=>sendMessage(b.dataset.text))

applyTheme('dark')
</script>
